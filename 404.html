        let availableMovies = [...allMovies];
        let currentMovie = null;
        let score = 0;
        let highScore = localStorage.getItem('keepmoviez_404_highscore') || 0;

        const emojiDisplay = document.getElementById('emoji-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackEl = document.getElementById('feedback');
        const currentScoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');

        highScoreEl.innerText = highScore;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadNextQuestion() {
            if (availableMovies.length === 0) {
                availableMovies = [...allMovies]; // Reset pool if exhausted
            }

            // Pick a random movie
            const randomIndex = Math.random() * availableMovies.length | 0;
            currentMovie = availableMovies.splice(randomIndex, 1)[0];

            emojiDisplay.innerText = currentMovie.emojis;
            feedbackEl.innerText = "";
            feedbackEl.className = "feedback";

            // Shuffle options
            let opts = [...currentMovie.options];
            shuffleArray(opts);

            optionsContainer.innerHTML = "";
            opts.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => handleGuess(btn, opt);
                optionsContainer.appendChild(btn);
            });
        }

        function handleGuess(btn, guessed) {
            // Disable all buttons
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (guessed === currentMovie.answer) {
                btn.classList.add('correct');
                feedbackEl.innerText = "Correct! 🎬 +10";
                feedbackEl.classList.add('success');
                score += 10;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('keepmoviez_404_highscore', highScore);
                    highScoreEl.innerText = highScore;
                }
            } else {
                btn.classList.add('wrong');
                feedbackEl.innerText = `Oops! It was ${currentMovie.answer}`;
                feedbackEl.classList.add('error');
                
                // Highlight the correct one
                allBtns.forEach(b => {
                    if (b.innerText === currentMovie.answer) {
                        b.classList.add('correct');
                    }
                });
                
                score = 0; // Reset score on wrong answer
            }

            currentScoreEl.innerText = score;

            // Load next after delay
            setTimeout(loadNextQuestion, 2000);
        }

        function resetGame() {
            score = 0;
            currentScoreEl.innerText = score;
            availableMovies = [...allMovies];
            loadNextQuestion();
        }

        // Start game
        loadNextQuestion();
